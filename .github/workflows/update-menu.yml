name: Update README Menu

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate menu for each directory
        run: |
          for dir in */; do
            if [ -f "$dir/README.md" ]; then
              echo "Processing $dir..."
              cd "$dir"
              # Простой скрипт генерации меню (аналог Способ 2, но в лайнере)
              {
                echo "<!-- MENU_START -->"
                echo "# Содержание"
                echo ""
                for f in *.md; do
                  if [ "$f" != "README.md" ]; then
                    title=$(basename "$f" .md)
                    desc=$(grep -m1 '^# ' "$f" | cut -d' ' -f2- 2>/dev/null || echo "No description")
                    echo "- [**$title**]($f) — $desc"
                  fi
                done
                echo ""
                echo "<!-- MENU_END -->"
              } > temp_menu.md
              # Заменяем старый блок меню в README.md
              sed -i '/<!-- MENU_START -->/,/<!-- MENU_END -->/d' README.md
              cat temp_menu.md >> README.md
              rm temp_menu.md
              cd ..
            fi
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление меню в README"
          file_pattern: '**/README.md'
